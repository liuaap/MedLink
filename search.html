<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜尋結果｜MedLink</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="search.css">
</head>
<body>

<main class="app-shell">

  <header class="search-header">
    <a href="index.html" class="back-link">←</a>

    <div class="search-input">
      植牙
    </div>

    <button>
      篩選
    </button>
  </header>

  <section class="result-summary">
    <p class="eyebrow">
      搜尋結果
    </p>

    <h1>
      找到 56 位植牙醫師、42 間診所
    </h1>

    <p>
      依距離與評價排序
    </p>
  </section>

  <section class="filter-chips">
    <span class="chip active">全部</span>
    <span class="chip">今日可約</span>
    <span class="chip">價格</span>
    <span class="chip">材質</span>
    <span class="chip">設備</span>
  </section>

  <section class="insight-card">
    <h2>植牙關鍵資訊</h2>

    <div class="insight-grid">
      <div>
        <strong>價格</strong>
        <span>6~12萬</span>
      </div>

      <div>
        <strong>材質</strong>
        <span>鈦金屬</span>
      </div>

      <div>
        <strong>設備</strong>
        <span>3D斷層</span>
      </div>
    </div>
  </section>

  <section class="section-head">
    <h2>推薦結果</h2>
  </section>

  <section id="resultList"></section>

</main>

<script src="search.js"></script>

</body>
</html>
