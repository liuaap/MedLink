<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedLink 醫鏈</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="topbar">
        <div>
          <p class="eyebrow">MedLink 醫鏈</p>
          <h1>找診所、找醫師，完成預約</h1>
        </div>
        <div class="avatar">M</div>
      </div>
      <div class="location">📍 目前位置：台中市西屯區</div>
      <div class="search-box">🔎 找診所、醫師、症狀或治療</div>
      <div class="quick-actions">
        <button>今日可看</button>
        <button>附近診所</button>
        <button>找醫師</button>
      </div>
    </section>

    <section class="trust-card">
      <div>
        <strong>試營運準備中</strong>
        <p>合作診所 1 間｜MVP 已完成｜Product Polish 進行中</p>
      </div>
      <span>V0.2</span>
    </section>

    <section class="section-head">
      <h2>推薦診所</h2>
      <button>查看全部</button>
    </section>

    <section class="clinic-list" id="clinicList"></section>

    <nav class="tabbar">
      <a class="active">首頁</a>
      <a>我的預約</a>
      <a>通知</a>
      <a>帳號</a>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
